apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow-service
  namespace: finmark
  labels:
    app: workflow-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: workflow-service
  template:
    metadata:
      labels:
        app: workflow-service
        tier: backend
    spec:
      containers:
        - name: workflow-service
          image: finmark/workflow-service:latest
          ports:
            - containerPort: 3005
          env:
            - name: PORT
              value: "3005"
            - name: AGENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: finmark-config
                  key: AGENT_SERVICE_URL
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: workflow-service
  namespace: finmark
spec:
  selector:
    app: workflow-service
  ports:
    - port: 3005
      targetPort: 3005
