apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-service
  namespace: finmark
  labels:
    app: agent-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent-service
  template:
    metadata:
      labels:
        app: agent-service
        tier: backend
    spec:
      containers:
        - name: agent-service
          image: finmark/agent-service:latest
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: LLM_GATEWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: finmark-config
                  key: LLM_GATEWAY_URL
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: agent-service
  namespace: finmark
spec:
  selector:
    app: agent-service
  ports:
    - port: 3001
      targetPort: 3001
