apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-gateway
  namespace: finmark
  labels:
    app: llm-gateway
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llm-gateway
  template:
    metadata:
      labels:
        app: llm-gateway
        tier: backend
    spec:
      containers:
        - name: llm-gateway
          image: finmark/llm-gateway:latest
          ports:
            - containerPort: 3002
          env:
            - name: PORT
              value: "3002"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: llm-gateway
  namespace: finmark
spec:
  selector:
    app: llm-gateway
  ports:
    - port: 3002
      targetPort: 3002
