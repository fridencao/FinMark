version: '3.8'

services:
  # Kong API Gateway
  kong:
    image: kong:3.4
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
    environment:
      KONG_DATABASE: "postgres"
      KONG_PG_HOST: postgres
      KONG_PG_PORT: 5432
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
      KONG_PG_DATABASE: kong
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_LOG_LEVEL: info
    volumes:
      - ./kong/kong.yml:/usr/local/kong/kong.yml:ro
    networks:
      - finmark-network
    depends_on:
      - postgres
      - redis
      - agent-service
      - llm-gateway
      - data-service

  # Microservices
  agent-service:
    build:
      context: ./services/agent-service
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      LLM_GATEWAY_URL: http://llm-gateway:3002
    networks:
      - finmark-network
    depends_on:
      - llm-gateway

  llm-gateway:
    build:
      context: ./services/llm-gateway
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    networks:
      - finmark-network

  data-service:
    build:
      context: ./services/data-service
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    environment:
      DATABASE_URL: postgresql://finmark:finmark@postgres:5432/finmark
    volumes:
      - ./services/data-service/prisma:/app/prisma
    networks:
      - finmark-network
    depends_on:
      - postgres

  # Database
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: finmark
      POSTGRES_PASSWORD: finmark
      POSTGRES_DB: finmark
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - finmark-network

  # Kong's own database
  kong-db:
    image: postgres:15
    environment:
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: kong
      POSTGRES_DB: kong
    volumes:
      - kong-db-data:/var/lib/postgresql/data
    networks:
      - finmark-network

  # Redis for rate limiting
  redis:
    image: redis:7-alpine
    networks:
      - finmark-network

volumes:
  postgres-data:
  kong-db-data:

networks:
  finmark-network:
    driver: bridge
