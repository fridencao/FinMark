version: '3.8'

services:
  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: finmark
      POSTGRES_PASSWORD: finmark123
      POSTGRES_DB: finmark
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finmark"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - finmark-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - finmark-network

  kong:
    image: kong:3.4
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
      - "8444:8444"
    environment:
      KONG_DATABASE: "postgres"
      KONG_PG_HOST: postgres
      KONG_PG_PORT: 5432
      KONG_PG_USER: finmark
      KONG_PG_PASSWORD: finmark123
      KONG_PG_DATABASE: finmark
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_LOG_LEVEL: info
      KONG_PLUGINS: bundled,rate-limiting,prometheus
    volumes:
      - ./kong/kong.yml:/usr/local/kong/kong.yml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - finmark-network

  data-service:
    build:
      context: .
      dockerfile: Dockerfile.data-service
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://finmark:finmark123@postgres:5432/finmark
      JWT_SECRET: ${JWT_SECRET:-finmark-super-secret-jwt-key-change-in-production}
      PORT: 3001
      NODE_ENV: production
      CORS_ORIGIN: "*"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - finmark-network
    restart: unless-stopped

  llm-gateway:
    build:
      context: .
      dockerfile: Dockerfile.llm-gateway
    ports:
      - "3002:3002"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: gemini-2.5-flash
      PORT: 3002
      NODE_ENV: production
    depends_on:
      - kong
    networks:
      - finmark-network
    restart: unless-stopped

  agent-service:
    build:
      context: .
      dockerfile: Dockerfile.agent-service
    ports:
      - "3003:3003"
    environment:
      LLM_GATEWAY_URL: http://llm-gateway:3002
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      PORT: 3003
      NODE_ENV: production
    depends_on:
      - llm-gateway
      - kong
    networks:
      - finmark-network
    restart: unless-stopped

volumes:
  postgres-data:

networks:
  finmark-network:
    driver: bridge
