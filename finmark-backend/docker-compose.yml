version: '3.8'

services:
  kong:
    image: kong:3.4
    ports:
      - "8000:8000"
      - "8443:8443"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ./kong/kong.yml:/usr/local/kong/kong.yml:ro
    networks:
      - finmark-network
    depends_on:
      - agent-service
      - llm-gateway
      - data-service

  agent-service:
    build:
      context: ./services/agent-service
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      LLM_GATEWAY_URL: http://llm-gateway:3002
    networks:
      - finmark-network
    depends_on:
      - llm-gateway

  llm-gateway:
    build:
      context: ./services/llm-gateway
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    networks:
      - finmark-network

  data-service:
    build:
      context: ./services/data-service
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    environment:
      DATABASE_URL: postgresql://finmark:finmark@postgres:5432/finmark
    volumes:
      - ./services/data-service/prisma:/app/prisma
    networks:
      - finmark-network
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: finmark
      POSTGRES_PASSWORD: finmark
      POSTGRES_DB: finmark
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - finmark-network

  redis:
    image: redis:7-alpine
    networks:
      - finmark-network

volumes:
  postgres-data:

networks:
  finmark-network:
    driver: bridge
